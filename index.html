<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lost & Found Buddy</title>

  <!-- Fonts / Framework -->
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="ambient-glow"></div>
  <div class="ambient-glow-2"></div>

  <div class="toast-container" id="toastContainer"></div>

  <div class="app-shell" id="appShell">

    <!-- Navbar -->
    <nav class="top-navbar">
      <div class="app-logo">
        <div class="app-logo-icon">🔎</div>
        <span class="app-logo-text">Lost & Found Buddy</span>
      </div>

      <div class="nav-actions">
        <button class="notif-btn" id="notifBtn">
          <i class="bi bi-bell-fill"></i>
          <span class="notif-badge"></span>
        </button>
        <div class="avatar-btn" id="avatarBtn">N</div>
      </div>
    </nav>

    <!-- Main -->
    <main>

      <section class="welcome-section">
        <h1 id="greetingText">สวัสดี 👋</h1>
        <p id="subtitleText">คุณต้องการแจ้งของหายหรือพบของ?</p>
      </section>

      <section class="action-buttons">
        <button class="action-card action-lost" id="btnLost">
          🔍 แจ้งของหาย
        </button>

        <button class="action-card action-found" id="btnFound">
          📦 แจ้งของที่พบ
        </button>
      </section>

      <section class="search-section">
        <input id="searchInput" class="search-input" placeholder="ค้นหา...">
      </section>

      <section class="chips-section" id="chipsContainer">
        <button class="chip active" data-category="all">ทั้งหมด</button>
        <button class="chip" data-category="electronics">📱</button>
        <button class="chip" data-category="bags">👜</button>
      </section>

      <div class="section-header">
        <h2>โพสต์ล่าสุด</h2>
      </div>

      <section id="cardsContainer"></section>

    </main>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <button id="navHome" class="nav-item active">🏠</button>
      <button id="navAdd" class="nav-add-btn">+</button>
      <button id="navProfile" class="nav-item">👤</button>
    </nav>

  </div>

  <!-- JS -->
  <script src="app.js"></script>
</body>
</html>
